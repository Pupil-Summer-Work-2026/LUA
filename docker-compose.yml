services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      STATIC_ROOT: /data/static
      MEDIA_ROOT: /data/media
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/data/media
      - static_data:/data/static

  caddy:
    build:
      context: .
      target: frontend-server
      args:
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
    restart: unless-stopped
    env_file: .env
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - media_data:/srv/media:ro
      - static_data:/srv/static:ro

volumes:
  caddy_config:
  caddy_data:
  media_data:
  postgres_data:
  static_data:
